services:
  postgres:
    image: postgres:17
    container_name: api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unnamed_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unnamed_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_migrate
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["migrate", "up"]
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-dev}
        COMMIT: ${COMMIT:-local}
        BUILD_DATE: ${BUILD_DATE:-unknown}
    container_name: api_server
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped
    command: ["serve"]

volumes:
  postgres_data:
