openapi: 3.0.3

info:
  title: Go REST API
  description: |
    Production-ready REST API with JWT authentication, RBAC, and email verification.

    ## Authentication
    Most protected endpoints require a Bearer token in the `Authorization` header:
    ```
    Authorization: Bearer <access_token>
    ```
    Obtain a token via `POST /api/v1/auth/login`.
  version: "1.0"
  contact: {}

servers:
  - url: http://api.localhost
    description: Local development

tags:
  - name: auth
    description: Registration, login, token management, email verification
  - name: password-reset
    description: Password reset flow
  - name: users
    description: User profile
  - name: admin
    description: Admin-only endpoints (role=admin or permission=admin.access)
  - name: uploads
    description: Presigned object-storage URLs
  - name: health
    description: Liveness and readiness probes
  - name: friends
    description: Friend requests, friendships and subscriptions
  - name: close-friends
    description: Manage the close friends list used for story visibility
  - name: stories
    description: Ephemeral photo/video stories, feed, views, likes and replies
  - name: channels
    description: Video channel creation, metadata, avatars and banners
  - name: photos
    description: Photo upload, listing, metadata and visibility management
  - name: albums
    description: Album CRUD, cover photo and album-level visibility

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    # ── Wrappers ────────────────────────────────────────────────────────────────
    MessageData:
      type: object
      properties:
        message:
          type: string
          example: operation completed successfully

    CreateChannelRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: My Channel
        description:
          type: string
          maxLength: 500
          example: My channel description

    ChannelResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        avatar_url:
          type: string
        banner_url:
          type: string
        subscribers_count:
          type: integer
          format: int64
        videos_count:
          type: integer
          format: int64
        is_subscribed:
          type: boolean
        created_at:
          type: string
          format: date-time

    ChannelAvatarResponse:
      type: object
      properties:
        avatar_url:
          type: string

    ChannelBannerResponse:
      type: object
      properties:
        banner_url:
          type: string

    VideoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        channel_id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        visibility:
          type: string
        status:
          type: string
        cover_url:
          type: string
        thumbnail_url:
          type: string
        hls_url:
          type: string
        mp4_360_url:
          type: string
        mp4_720_url:
          type: string
        duration_sec:
          type: number
        width:
          type: integer
        height:
          type: integer
        views_count:
          type: integer
          format: int64
        likes_count:
          type: integer
          format: int64
        comments_count:
          type: integer
          format: int64
        is_liked:
          type: boolean
        created_at:
          type: string
          format: date-time
        processing_stage:
          type: string
          description: >
            Current processing stage. Only present while status is "processing".
            One of: downloading, probing, thumbnail, transcode_360p, transcode_720p,
            transcode_1080p, uploading.
        processing_progress:
          type: integer
          description: >
            Overall processing progress (0–100). Only meaningful while status is
            "processing". Use together with processing_stage for a progress indicator.
            On reconnect, fetch this field via GET /api/v1/videos/{id} to recover any
            missed WebSocket progress events.

    VideoListResponse:
      type: object
      properties:
        videos:
          type: array
          items:
            $ref: '#/components/schemas/VideoResponse'
        total:
          type: integer

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: validation failed

    ValidationFieldError:
      type: object
      properties:
        field:
          type: string
          example: email
        message:
          type: string
          example: must be a valid email address

    ValidationErrorDetail:
      allOf:
        - $ref: '#/components/schemas/ErrorDetail'
        - type: object
          properties:
            details:
              type: array
              items:
                $ref: '#/components/schemas/ValidationFieldError'

    # ── Auth ────────────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password, full_name, username]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          minLength: 8
          example: securepassword123
        full_name:
          type: string
          minLength: 2
          maxLength: 100
          example: Jane Smith
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[a-zA-Z0-9._-]+$'
          example: jane.smith
        phone:
          type: string
          pattern: '^\+'
          example: "+79991234567"

    UpdateProfileRequest:
      type: object
      required: [full_name, username]
      properties:
        full_name:
          type: string
          minLength: 2
          maxLength: 100
          example: Jane Smith
        username:
          type: string
          minLength: 3
          maxLength: 30
          pattern: '^[a-zA-Z0-9._-]+$'
          example: jane.smith
        phone:
          type: string
          example: "+79991234567"

    UserSearchItem:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 3
        username:
          type: string
          example: jane.smith
        full_name:
          type: string
          example: Jane Smith
        avatar_url:
          type: string
          example: https://cdn.example.com/users/3/avatar.jpg

    UserSearchResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserSearchItem'

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          minLength: 1
        new_password:
          type: string
          minLength: 8
          example: newSecurePassword123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          example: securepassword123
        device_name:
          type: string
          maxLength: 255
          example: Chrome on macOS

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: Y7vL6mQ9qF...

    LogoutRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          example: Y7vL6mQ9qF...

    ResendVerificationRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    AuthTokens:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refresh_token:
          type: string
          example: Y7vL6mQ9qF...

    AccessToken:
      type: object
      properties:
        access_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    UserSession:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 42
        user_id:
          type: integer
          format: int64
          example: 1
        device_name:
          type: string
          example: Chrome on macOS
        user_agent:
          type: string
          example: Mozilla/5.0
        ip_address:
          type: string
          example: 203.0.113.10
        created_at:
          type: string
          format: date-time
          example: "2026-06-13T10:15:30Z"
        last_used_at:
          type: string
          format: date-time
          example: "2026-06-13T11:20:00Z"

    SessionList:
      type: object
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/UserSession'

    # ── Password reset ──────────────────────────────────────────────────────────
    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: user@example.com

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
          example: a3f9c2...
        new_password:
          type: string
          minLength: 8
          example: newSecurePassword123

    # ── Users ───────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        full_name:
          type: string
          example: Jane Smith
        username:
          type: string
          example: jane.smith
        phone:
          type: string
          example: "+79991234567"
        role:
          type: string
          example: user
        created_at:
          type: string
          format: date-time
          example: "2026-06-12T09:53:01Z"

    PublicProfile:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        username:
          type: string
          example: jane.smith
        full_name:
          type: string
          example: Jane Smith
        avatar_url:
          type: string
          example: https://cdn.example.com/avatars/1.png
        cover_url:
          type: string
          example: https://cdn.example.com/covers/1.png
        email:
          type: string
          format: email
          nullable: true
          example: user@example.com
        phone:
          type: string
          nullable: true
          example: "+79991234567"
        friends_count:
          type: integer
          format: int64
          nullable: true
          example: 123
        relation:
          type: string
          example: friends
        created_at:
          type: string
          format: date-time
          example: "2026-06-12T09:53:01Z"

    UserSummary:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        email:
          type: string
          format: email
          example: user@example.com
        full_name:
          type: string
          example: Jane Smith
        username:
          type: string
          example: jane.smith
        phone:
          type: string
          example: "+79991234567"
        role:
          type: string
          example: user
        created_at:
          type: string
          format: date-time
          example: "2026-06-12T09:53:01Z"

    SystemSetting:
      type: object
      properties:
        key:
          type: string
          example: theme
        value:
          type: object
        updated_at:
          type: string
          format: date-time
          example: "2026-06-12T09:53:01Z"

    SystemSettingsList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SystemSetting'

    # ── User Settings ─────────────────────────────────────────────────────────
    UserSettings:
      type: object
      properties:
        user_id:
          type: integer
          format: int64
          example: 1
        storage_quota_bytes:
          type: integer
          format: int64
          example: 1073741824
        storage_used_bytes:
          type: integer
          format: int64
          example: 12345678
        bucket_name:
          type: string
          example: user-1-bucket
        theme:
          type: object
        updated_at:
          type: string
          format: date-time
          example: "2026-06-13T12:00:00Z"

    UpdateThemeRequest:
      type: object
      required: [theme]
      properties:
        theme:
          type: object

    # ── Notifications ───────────────────────────────────────────────────────
    NotificationPreferencesRequest:
      type: object
      description: JSON object with boolean flags per notification type. Missing keys default to true.
      example:
        story_published: true
        friend_request_received: true
        friend_request_accepted: true

    Notification:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        user_id:
          type: integer
          format: int64
          example: 2
        actor_id:
          type: integer
          format: int64
          example: 1
        type:
          type: string
          example: story_published
        entity_type:
          type: string
          example: story
        entity_id:
          type: integer
          format: int64
          example: 42
        payload:
          type: object
          description: Event-specific payload for client rendering
        is_read:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: "2026-06-13T12:00:00Z"

    NotificationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          format: int64
          example: 5
        totalPages:
          type: integer
          example: 1

    AdminUpdateQuotaRequest:
      type: object
      required: [storage_quota_bytes]
      properties:
        storage_quota_bytes:
          type: integer
          format: int64
          example: 2147483648

    UploadURLResponse:
      type: object
      properties:
        avatar_url:
          type: string
        cover_url:
          type: string

    # ── Photos & Albums ───────────────────────────────────────────────────
    PhotoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        album_id:
          type: integer
          format: int64
          nullable: true
        display_name:
          type: string
        url:
          type: string
        size_bytes:
          type: integer
          format: int64
        width:
          type: integer
          nullable: true
        height:
          type: integer
          nullable: true
        mime_type:
          type: string
        visibility:
          type: string
          enum: [everyone, friends, nobody]
        likes_count:
          type: integer
        comments_count:
          type: integer
        is_liked:
          type: boolean
        device_name:
          type: string
          nullable: true
        device_os:
          type: string
          nullable: true
        device_type:
          type: string
          nullable: true
        latitude:
          type: number
          format: double
          nullable: true
        longitude:
          type: number
          format: double
          nullable: true
        location_name:
          type: string
          nullable: true
        exif_data:
          type: object
          nullable: true
        created_at:
          type: string
          format: date-time

    CommentAuthorResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        full_name:
          type: string
        username:
          type: string
        avatar_url:
          type: string

    CommentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        photo_id:
          type: integer
          format: int64
        parent_id:
          type: integer
          format: int64
          nullable: true
        body:
          type: string
        is_deleted:
          type: boolean
        likes_count:
          type: integer
        replies_count:
          type: integer
        is_liked:
          type: boolean
        author:
          $ref: '#/components/schemas/CommentAuthorResponse'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AddCommentRequest:
      type: object
      required: [body]
      properties:
        parent_id:
          type: integer
          format: int64
          nullable: true
        body:
          type: string
          minLength: 1
          maxLength: 2000

    EditCommentRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          minLength: 1
          maxLength: 2000

    PaginatedCommentsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CommentResponse'
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    PhotoList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PhotoResponse'
        total:
          type: integer
          format: int64

    UpdatePhotoRequest:
      type: object
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 255
        visibility:
          type: string
          enum: [everyone, friends, nobody]
        hidden_from:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 500

    MovePhotoRequest:
      type: object
      properties:
        album_id:
          type: integer
          format: int64
          nullable: true

    AlbumResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [everyone, friends, nobody]
        cover_url:
          type: string
          nullable: true
        photo_count:
          type: integer
        created_at:
          type: string
          format: date-time

    AlbumList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AlbumResponse'
        total:
          type: integer
          format: int64

    CreateAlbumRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type: string
          maxLength: 512
        visibility:
          type: string
          enum: [everyone, friends, nobody]
        hidden_from:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 500

    UpdateAlbumRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type: string
          maxLength: 512
        visibility:
          type: string
          enum: [everyone, friends, nobody]
        hidden_from:
          type: array
          items:
            type: integer
            format: int64
          maxItems: 500

    SetAlbumCoverRequest:
      type: object
      properties:
        photo_id:
          type: integer
          format: int64
          nullable: true

    UpdateSystemSettingRequest:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
          enum: [default_storage_quota_bytes, default_bucket_policy, theme]
        value:
          type: object

    # ── Stories ──────────────────────────────────────────────────────────────
    # Note: the backend stores `slides` as opaque JSON (json.RawMessage) — it
    # does not validate their internal shape beyond the array length. The
    # structure below reflects what the official web editor currently sends/
    # expects, not a server-enforced contract.
    StorySlide:
      type: object
      description: >-
        Opaque slide payload as produced by the story editor. Any `url` field
        pointing at uploaded media should be the storage `key` returned by
        `POST /stories/media`, not a local blob URL; the server replaces it
        with a short-lived presigned URL on read.
      properties:
        id:
          type: string
        rendered_url:
          type: string
          description: >-
            Optional storage key for a pre-rendered composite image of the
            slide (background + elements). If present the server will return
            a short-lived presigned URL on read for direct display.
        background:
          type: object
          nullable: true
          description: 'One of: {kind: color|gradient, value}, {kind: pattern, value, preview}, {kind: media, url, mediaType: image|video, preview?}'
        filterId:
          type: string
        adjustments:
          type: object
          description: contrast/warmth/saturation/sharpness/noise/vignette tuning, each 0-200 (warmth -100..100)
        elements:
          type: array
          items:
            type: object
            description: 'A text, sticker, image or drawing element; shape varies by `type`.'
        text:
          type: string
          description: Convenience field some clients read when a slide has no image background.
        seen:
          type: boolean
          description: Server-added on read (`/stories/feed`, `/stories/me`); not part of the stored slide.

    CreateStoryRequest:
      type: object
      required: [slides, visibility, duration]
      properties:
        slides:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/StorySlide'
        visibility:
          type: string
          enum: [everyone, friends, close]
        duration:
          type: integer
          description: Story lifetime in hours.
          enum: [1, 12, 24, 48]
        hidden_from:
          type: array
          items:
            type: integer
            format: int64
          description: User IDs excluded from seeing this story even if `visibility` would otherwise allow it.
    AddCloseFriendRequest:
      type: object
      required: [friend_id]
      properties:
        friend_id:
          type: integer
          format: int64
          example: 42
    CloseFriendResponse:
      type: object
      properties:
        friend_id:
          type: integer
          format: int64
          example: 42
    CloseFriendList:
      type: array
      items:
        $ref: '#/components/schemas/CloseFriendResponse'

    StoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        author_name:
          type: string
        author_avatar:
          type: string
        visibility:
          type: string
          enum: [everyone, friends, close]
        duration:
          type: integer
          enum: [1, 12, 24, 48]
        hidden_from:
          type: array
          items:
            type: integer
            format: int64
        slides:
          type: array
          items:
            $ref: '#/components/schemas/StorySlide'
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    FeedSlide:
      type: object
      properties:
        id:
          type: string
        rendered_url:
          type: string
        seen:
          type: boolean

    FeedStoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        user_id:
          type: integer
          format: int64
        author_name:
          type: string
        author_username:
          type: string
        author_avatar:
          type: string
        visibility:
          type: string
          enum: [everyone, friends, close]
        duration:
          type: integer
          enum: [1, 12, 24, 48]
        hidden_from:
          type: array
          items:
            type: integer
            format: int64
        slides:
          type: array
          items:
            $ref: '#/components/schemas/FeedSlide'
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time

    StoryMediaResponse:
      type: object
      properties:
        key:
          type: string
          description: Storage object key — persist this in the slide JSON sent to `POST /stories`.
        url:
          type: string
          description: Short-lived (15 minute) presigned URL for immediate preview only; do not persist it.
        media_type:
          type: string
          enum: [image, video]

        author_username:
          type: string
    # ── Admin ───────────────────────────────────────────────────────────────────
    Permission:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          example: admin.access
        description:
          type: string
          example: Access administration endpoints
        created_at:
          type: string
          format: date-time
          example: "2026-06-12T09:53:01Z"

    PermissionList:
      type: object
      properties:
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'

    HealthCheckResult:
      type: object
      properties:
        status:
          type: string
          enum: [ok, fail]
        message:
          type: string

    HealthReport:
      type: object
      properties:
        status:
          type: string
          enum: [ok, fail]
        checks:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/HealthCheckResult'
          example:
            postgres:
              status: ok

    SendFriendRequest:
      type: object
      required: [addressee_id]
      properties:
        addressee_id:
          type: integer
          format: int64
          example: 2

    Friendship:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 123
        requester_id:
          type: integer
          format: int64
          example: 1
        addressee_id:
          type: integer
          format: int64
          example: 2
        status:
          type: string
          example: pending
        created_at:
          type: string
          format: date-time
          example: "2026-06-13T10:15:30Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-06-13T10:15:30Z"

    UserSuggestion:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        full_name:
          type: string
        avatar_url:
          type: string
  responses:
    400BadRequest:
      description: Malformed request body
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ErrorDetail'
          example:
            error:
              code: BAD_REQUEST
              message: invalid request body

    401Unauthorized:
      description: Missing or invalid credentials / token
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ErrorDetail'
          example:
            error:
              code: INVALID_CREDENTIALS
              message: invalid email or password

    403Forbidden:
      description: Insufficient role or permission
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ErrorDetail'
          example:
            error:
              code: FORBIDDEN
              message: you do not have permission to access this resource

    404NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ErrorDetail'
          example:
            error:
              code: USER_NOT_FOUND
              message: user not found

    409Conflict:
      description: Conflict — resource already exists
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ErrorDetail'
          example:
            error:
              code: USER_ALREADY_EXISTS
              message: user already exists

    422Validation:
      description: Validation failed
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ValidationErrorDetail'
          example:
            error:
              code: VALIDATION_ERROR
              message: validation failed
              details:
                - field: email
                  message: must be a valid email address
                - field: username
                  message: must contain only letters, digits, dots, dashes, or underscores

    429TooMany:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ErrorDetail'
          example:
            error:
              code: RATE_LIMITED
              message: too many requests

    500Internal:
      description: Unexpected server error
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                $ref: '#/components/schemas/ErrorDetail'
          example:
            error:
              code: INTERNAL_SERVER_ERROR
              message: internal server error

# ────────────────────────────────────────────────────────────────────────────────
# PATHS
# ────────────────────────────────────────────────────────────────────────────────
paths:
  /api/v1/channels:
    post:
      tags: [channels]
      summary: Create the current user's channel
      operationId: createChannel
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        "201":
          description: Channel created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ChannelResponse'
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "409": { $ref: '#/components/responses/409Conflict' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/channels/me/avatar:
    post:
      tags: [channels]
      summary: Upload the current user's channel avatar
      operationId: uploadChannelAvatar
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ChannelAvatarResponse'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/channels/me/banner:
    post:
      tags: [channels]
      summary: Upload the current user's channel banner
      operationId: uploadChannelBanner
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Banner uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ChannelBannerResponse'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/videos/feed:
    get:
      tags: [channels]
      summary: List videos from subscribed channels
      description: Returns the authenticated user's subscription feed, containing only public videos from channels they follow.
      operationId: videosFeed
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        "200":
          description: Subscription feed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/VideoListResponse'
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/videos/search:
    get:
      tags: [channels]
      summary: Search public videos
      description: Searches public videos by title or description and optionally filters by category.
      operationId: videosSearch
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        "200":
          description: Matching public videos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/VideoListResponse'
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
  /health/live:
    get:
      tags: [health]
      summary: Liveness probe
      description: Always returns 200. Used by orchestrators to confirm the process is alive.
      operationId: healthLive
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/HealthReport'
  /health/ready:
    get:
      tags: [health]
      summary: Readiness probe
      description: Returns 200 only when all dependencies (e.g. PostgreSQL) are reachable.
      operationId: healthReady
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/HealthReport'
        "503":
          description: Service is not ready (dependency failure)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/HealthReport'
  /api/v1/auth/register:
    post:
      tags: [auth]
      summary: Register a new user
      description: |
        Creates a new account and sends an email verification link.
        The user **cannot log in** until the email is verified.
      operationId: authRegister
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: User registered — verification email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: user registered successfully, please check your email to verify your account
        "400": { $ref: '#/components/responses/400BadRequest' }
        "409": { $ref: '#/components/responses/409Conflict' }
        "422": { $ref: '#/components/responses/422Validation' }
        "429": { $ref: '#/components/responses/429TooMany' }
        "500": { $ref: '#/components/responses/500Internal' }
    patch:
      tags: [users]
      summary: Update current user profile
      description: Update the authenticated user's profile fields.
      operationId: usersUpdateProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserProfile'
              example:
                data:
                  id: 1
                  email: user@example.com
                  full_name: Jane Smith
                  username: jane.smith
                  phone: "+79991234567"
                  role: user
                  created_at: "2026-06-12T09:53:01Z"
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/search:
    get:
      tags: [users]
      summary: Search users
      description: >
        Searches confirmed users by username/full name (e.g. for mention
        pickers). Only users who have verified their email are indexed and
        therefore returned. No privacy filtering is applied yet — every
        authenticated user can search every confirmed user.
      operationId: usersSearch
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
          example: jane
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 20
          example: 6
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserSearchResponse'
              example:
                data:
                  items:
                    - id: 3
                      username: jane.smith
                      full_name: Jane Smith
                      avatar_url: https://cdn.example.com/users/3/avatar.jpg
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/me/password:
    put:
      tags: [users]
      summary: Change current user's password
      description: Change password for the authenticated user.
      operationId: usersChangePassword
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: password changed successfully
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/notifications:
    get:
      tags: [users]
      summary: List current user's notifications
      description: Returns paginated list of notifications for the authenticated user.
      operationId: notificationsList
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          schema:
            type: integer
            example: 20
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationList'
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/notifications/unread-count:
    get:
      tags: [users]
      summary: Get unread notifications count
      operationId: notificationsUnreadCount
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Unread count
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      unread:
                        type: integer
                        format: int64
                        example: 3
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/notifications/{id}/read:
    post:
      tags: [users]
      summary: Mark a notification as read
      operationId: notificationsMarkRead
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: ok
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/notifications/read-all:
    post:
      tags: [users]
      summary: Mark all notifications as read
      operationId: notificationsMarkAllRead
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All notifications marked as read
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: ok
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
  /ws/notifications:
    get:
      tags: [users]
      summary: WebSocket upgrade for realtime notifications
      description: |
        Upgrade to a WebSocket connection to receive realtime notifications. Use the same
        Bearer token used for HTTP endpoints in the `Authorization` header when performing the upgrade.
        Messages are sent from server to client and follow the `Notification` schema.
      operationId: wsNotificationsSubscribe
      security:
        - BearerAuth: []
      responses:
        "101":
          description: Switching Protocols — WebSocket established
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/me/settings/notifications:
    patch:
      tags: [users]
      summary: Update current user's notification preferences
      description: Update per-type notification preferences. Missing keys are treated as `true` (fail-open).
      operationId: usersUpdateNotificationPreferences
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPreferencesRequest'
      responses:
        "200":
          description: Preferences updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: notification preferences updated
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/me/close-friends:
    get:
      tags: [close-friends]
      summary: List close friends
      operationId: closeFriendsList
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Close friends list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CloseFriendList'
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
    post:
      tags: [close-friends]
      summary: Add close friend
      operationId: closeFriendsAdd
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddCloseFriendRequest'
      responses:
        "201":
          description: Close friend added
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CloseFriendResponse'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "403": { $ref: '#/components/responses/403Forbidden' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/me/close-friends/{friendID}:
    delete:
      tags: [close-friends]
      summary: Remove close friend
      operationId: closeFriendsRemove
      security:
        - BearerAuth: []
      parameters:
        - name: friendID
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Close friend removed
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/me/settings:
    get:
      tags: [users]
      summary: Get current user's settings
      description: Returns storage and UI settings for the authenticated user.
      operationId: usersGetMySettings
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User settings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserSettings'
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
    patch:
      tags: [users]
      summary: Update current user's settings (theme)
      description: Allows the authenticated user to update their UI `theme` object.
      operationId: usersUpdateMySettings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateThemeRequest'
      responses:
        "200":
          description: Theme updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/me/avatar:
    post:
      tags: [users]
      summary: Upload avatar image for current user
      description: Uploads an avatar image. Expect multipart/form-data with field `file`.
      operationId: usersUploadAvatar
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Avatar uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UploadURLResponse'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
    delete:
      tags: [users]
      summary: Delete avatar image for current user
      description: Removes the current user's avatar from storage and clears the avatar URL.
      operationId: usersDeleteAvatar
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Avatar deleted
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/{username}:
    get:
      tags: [users]
      summary: Get public profile by username
      description: Returns a user's public profile according to their privacy settings. Requires authentication.
      operationId: usersGetByUsername
      security:
        - BearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Public profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/PublicProfile'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/me/cover:
    post:
      tags: [users]
      summary: Upload cover image for current user
      description: Uploads a cover image. Expect multipart/form-data with field `file`.
      operationId: usersUploadCover
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Cover uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UploadURLResponse'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
    delete:
      tags: [users]
      summary: Delete cover image for current user
      description: Removes the current user's cover image from storage and clears the cover URL.
      operationId: usersDeleteCover
      security:
        - BearerAuth: []
      responses:
        "204":
          description: Cover deleted
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Authenticate and obtain tokens
      description: |
        Validates credentials and returns a short-lived JWT access token
        and a long-lived opaque refresh token.

        Email verification is required before login is permitted.
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthTokens'
              example:
                data:
                  access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                  refresh_token: Y7vL6mQ9qF...
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "403":
          description: Email not verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/ErrorDetail'
              example:
                error:
                  code: EMAIL_NOT_VERIFIED
                  message: please verify your email address before logging in
        "422": { $ref: '#/components/responses/422Validation' }
        "429": { $ref: '#/components/responses/429TooMany' }
  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Refresh access token
      description: Exchanges a valid refresh token for a new JWT access token.
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        "200":
          description: New access token and refresh token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthTokens'
        "401":
          description: Refresh token is invalid, expired, or revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/ErrorDetail'
              example:
                error:
                  code: INVALID_REFRESH_TOKEN
                  message: refresh token is invalid
        "422": { $ref: '#/components/responses/422Validation' }
        "429": { $ref: '#/components/responses/429TooMany' }
  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Revoke refresh token
      description: Permanently revokes the supplied refresh token. The client should discard both tokens.
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: logged out successfully
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "422": { $ref: '#/components/responses/422Validation' }
        "429": { $ref: '#/components/responses/429TooMany' }
  /api/v1/auth/logout-all:
    post:
      tags: [auth]
      summary: Revoke all sessions
      description: Revokes all active sessions and refresh tokens for the authenticated user. User must log in again on all devices.
      operationId: authLogoutAll
      security:
        - BearerAuth: []
      responses:
        "200":
          description: All sessions revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: all sessions revoked successfully
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/auth/sessions:
    get:
      tags: [auth]
      summary: List active sessions
      description: Returns active sessions for the authenticated user.
      operationId: authListSessions
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Active session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SessionList'
              example:
                data:
                  sessions:
                    - id: 42
                      user_id: 1
                      device_name: Chrome on macOS
                      user_agent: Mozilla/5.0
                      ip_address: 203.0.113.10
                      created_at: "2026-06-13T10:15:30Z"
                      last_used_at: "2026-06-13T11:20:00Z"
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/auth/sessions/{id}:
    delete:
      tags: [auth]
      summary: Revoke session
      description: Revokes a session and its associated refresh token. Regular users can revoke only their own sessions; administrators can revoke any session.
      operationId: authRevokeSession
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          example: 42
      responses:
        "200":
          description: Session revoked
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: session revoked successfully
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "403": { $ref: '#/components/responses/403Forbidden' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/auth/verify-email:
    get:
      tags: [auth]
      summary: Verify email address
      description: Validates the one-time token sent to the user's email and marks the account as verified.
      operationId: authVerifyEmail
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          example: a3f9c2d1b8e74f6a...
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: email verified successfully
        "400":
          description: Invalid or expired verification token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/ErrorDetail'
              example:
                error:
                  code: INVALID_VERIFICATION_TOKEN
                  message: verification token is invalid or expired
        "409":
          description: Email already verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/ErrorDetail'
              example:
                error:
                  code: EMAIL_ALREADY_VERIFIED
                  message: email already verified
        "429": { $ref: '#/components/responses/429TooMany' }
  /api/v1/auth/resend-verification:
    post:
      tags: [auth]
      summary: Resend verification email
      operationId: authResendVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
      responses:
        "200":
          description: Verification email re-sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: verification email resent
        "400": { $ref: '#/components/responses/400BadRequest' }
        "409":
          description: Email already verified
          content:
            application/json:
              example:
                error:
                  code: EMAIL_ALREADY_VERIFIED
                  message: email already verified
        "422": { $ref: '#/components/responses/422Validation' }
        "429": { $ref: '#/components/responses/429TooMany' }
  /api/v1/auth/forgot-password:
    post:
      tags: [password-reset]
      summary: Initiate password reset
      description: |
        Sends a reset link to the email if it belongs to a registered account.

        **Always returns 200** regardless of whether the email is known,
        to prevent account enumeration.
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        "200":
          description: Request accepted (response is the same whether the email exists or not)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: if the email exists, a reset link has been sent
        "422": { $ref: '#/components/responses/422Validation' }
        "429": { $ref: '#/components/responses/429TooMany' }
  /api/v1/auth/reset-password:
    post:
      tags: [password-reset]
      summary: Complete password reset
      description: |
        Validates the one-time reset token, updates the password,
        and revokes **all** existing refresh tokens for the user.
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        "200":
          description: Password changed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: password has been reset successfully
        "400":
          description: Token is invalid, expired, or already used
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    $ref: '#/components/schemas/ErrorDetail'
              example:
                error:
                  code: BAD_REQUEST
                  message: password reset token is invalid or expired
        "422": { $ref: '#/components/responses/422Validation' }
        "429": { $ref: '#/components/responses/429TooMany' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users/me:
    get:
      tags: [users]
      summary: Get current user profile
      description: Returns the full profile of the authenticated user.
      operationId: usersMe
      security:
        - BearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UserProfile'
              example:
                data:
                  id: 1
                  email: user@example.com
                  full_name: Jane Smith
                  username: jane.smith
                  phone: "+79991234567"
                  role: user
                  created_at: "2026-06-12T09:53:01Z"
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/users:
    get:
      tags: [users]
      summary: List users
      description: Returns a paginated list of users. Requires `users.read` permission.
      operationId: usersList
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
          example: 20
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserSummary'
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
                  totalPages:
                    type: integer
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "403": { $ref: '#/components/responses/403Forbidden' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/friends/requests:
    post:
      tags: [friends]
      summary: Send a friend request / subscribe to a user
      description: Creates a directed request from the authenticated user to the specified addressee. The requester becomes a subscriber immediately. Publishes `friend.request_received` event.
      operationId: friendsSendRequest
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendFriendRequest'
      responses:
        "201":
          description: Friendship request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Friendship'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "409": { $ref: '#/components/responses/409Conflict' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }

  /api/v1/friends/requests/{id}/accept:
    post:
      tags: [friends]
      summary: Accept a friend request
      description: Accepts an incoming friend request. Publishes `friend.request_accepted` event.
      operationId: friendsAccept
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Friendship accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Friendship'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "403": { $ref: '#/components/responses/403Forbidden' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }

  /api/v1/friends/requests/{id}/reject:
    post:
      tags: [friends]
      summary: Reject a friend request
      description: Rejects an incoming friend request.
      operationId: friendsReject
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Friendship rejected
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Friendship'
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "403": { $ref: '#/components/responses/403Forbidden' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }

  /api/v1/friends/requests/{id}/cancel:
    post:
      tags: [friends]
      summary: Cancel an outgoing friend request
      description: Cancels (deletes) an outgoing pending request authored by the authenticated user.
      operationId: friendsCancel
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Request cancelled
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "403": { $ref: '#/components/responses/403Forbidden' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }

  /api/v1/friends/{id}:
    delete:
      tags: [friends]
      summary: Remove a friendship
      description: Removes an existing accepted friendship. Can be performed by either participant.
      operationId: friendsRemove
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: Friendship removed
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "403": { $ref: '#/components/responses/403Forbidden' }
        "404": { $ref: '#/components/responses/404NotFound' }
        "500": { $ref: '#/components/responses/500Internal' }

  /api/v1/friends:
    get:
      tags: [friends]
      summary: List friends (accepted)
      description: Returns a paginated list of accepted friendships for the authenticated user.
      operationId: friendsList
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        "200":
          description: Paginated friendship list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
                  totalPages:
                    type: integer
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }

  /api/v1/friends/requests/incoming:
    get:
      tags: [friends]
      summary: List incoming friend requests
      description: Paginated list of pending incoming friend requests (where authenticated user is addressee).
      operationId: friendsIncoming
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        "200":
          description: Paginated incoming requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
                  totalPages:
                    type: integer
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }

  /api/v1/friends/requests/outgoing:
    get:
      tags: [friends]
      summary: List outgoing friend requests
      description: Paginated list of pending outgoing friend requests (where authenticated user is requester).
      operationId: friendsOutgoing
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
      responses:
        "200":
          description: Paginated outgoing requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Friendship'
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
                  totalPages:
                    type: integer
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }

  /api/v1/friends/suggestions:
    get:
      tags: [friends]
      summary: List friend suggestions
      description: Returns users ordered by mutual friend count (desc). Falls back to random users when no mutual friends exist.
      operationId: friendsListSuggestions
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated list of user suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/UserSuggestion'
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "500": { $ref: '#/components/responses/500Internal' }

    patch:
      tags: [admin]
      summary: Update a system setting
      description: Upsert a single system setting. Requires role=admin.
      operationId: adminUpdateSetting
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSystemSettingRequest'
      responses:
        "200":
          description: Setting updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MessageData'
              example:
                data:
                  message: setting updated
        "400": { $ref: '#/components/responses/400BadRequest' }
        "401": { $ref: '#/components/responses/401Unauthorized' }
        "403": { $ref: '#/components/responses/403Forbidden' }
        "422": { $ref: '#/components/responses/422Validation' }
        "500": { $ref: '#/components/responses/500Internal' }
  /api/v1/stories/feed:
    get:
      tags: [uploads]
      summary: Get feed of visible stories for the authenticated user
      description: |
        Returns stories from people visible to the current user (respecting each
        story's `visibility` and `hidden_from` list), excluding the user's own
        story rows. Each slide is annotated with a best-effort `seen` flag based
        on the viewer's recorded views, and any media `background.url` storage
        keys are replaced with short-lived (15 minute) presigned URLs.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of story rows (stripped slides for feed)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FeedStoryResponse'

  /api/v1/stories/me:
    get:
      tags: [uploads]
      summary: Get my stories
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Array of story rows for the current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StoryResponse'

  /api/v1/stories:
    post:
      tags: [uploads]
      summary: Publish or append slides to current user's story
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                slides:
                  type: array
                  items:
                    $ref: '#/components/schemas/StorySlide'
                visibility:
                  type: string
                duration:
                  type: integer
                hidden_from:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: Published story row
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/StoryResponse'

  /api/v1/stories/{id}/view:
    post:
      tags: [uploads]
      summary: Record a view for a story (or a slide)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                slide_index:
                  type: integer
      responses:
        '204':
          description: View recorded

  /api/v1/stories/{id}/like:
    post:
      tags: [uploads]
      summary: Like a story
      security:
        - BearerAuth: []
      parameters:
        - in: path

  # ── Photos & Albums ───────────────────────────────────────────────────────
  /api/v1/photos:
    post:
      tags: [photos]
      summary: Upload a photo
      description: Uploads a photo file (multipart/form-data, field `file`). Respects user storage quota.
      operationId: photosUpload
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                album_id:
                  type: integer
                  format: int64
                latitude:
                  type: number
                  format: double
                  nullable: true
                longitude:
                  type: number
                  format: double
                  nullable: true
                location_name:
                  type: string
                  nullable: true
                device_name:
                  type: string
                  nullable: true
                device_os:
                  type: string
                  nullable: true
                device_type:
                  type: string
                  nullable: true
      responses:
        "201":
          description: Photo uploaded
          content:
            application/json:
              schema:
                type: object
